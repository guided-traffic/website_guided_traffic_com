name: Docker Publish

on:
  push:
    tags: ['v*']

jobs:
  build-and-push:
    runs-on: self-hosted
    strategy:
      matrix:
        include:
          - image: guided-traffic/website-guided-traffic-backend
            context: backend
          - image: guided-traffic/website-guided-traffic-frontend
            context: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: guided-traffic
          password: ${{ secrets.DOCKERHUB_PAT }}

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ steps.version.outputs.tag }}
            ${{ matrix.image }}:latest
