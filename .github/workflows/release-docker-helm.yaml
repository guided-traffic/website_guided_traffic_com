name: Release — Docker + Helm

on:
  release:
    types: [published]

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read
  attestations: write

jobs:
  build:
    runs-on: self-hosted
    strategy:
      matrix:
        include:
          - image: guidedtraffic/website-guided-traffic-frontend
            context: frontend/
            dockerfile: frontend/Dockerfile
            title: Frontend
          - image: guidedtraffic/website-guided-traffic-backend
            context: backend/
            dockerfile: backend/Dockerfile
            title: Backend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:v0.12.0
            network=host

      - uses: docker/login-action@v3
        with:
          username: guidedtraffic
          password: ${{ secrets.DOCKERHUB_PAT }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Guided Traffic ${{ matrix.title }}
            org.opencontainers.image.vendor=Guided Traffic
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=https://github.com/guided-traffic/website_guided_traffic_com
            org.opencontainers.image.documentation=https://github.com/guided-traffic/website_guided_traffic_com

      - name: Extract build metadata
        id: buildmeta
        run: |
          echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          provenance: true
          sbom: true
          build-args: |
            BUILD_NUMBER=${{ github.run_number }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.buildmeta.outputs.epoch }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ matrix.image }}:${{ steps.buildmeta.outputs.version }}
          upload-artifact: true
          upload-release-assets: false
          output-file: sbom-${{ matrix.title }}.spdx.json

      - name: Upload SBOM to release
        uses: softprops/action-gh-release@v2
        with:
          files: sbom-${{ matrix.title }}.spdx.json

      - name: Docker Scout CVE scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ matrix.image }}:${{ steps.buildmeta.outputs.version }}
          sarif-file: scout-report.sarif
          summary: true

  release-helm-gh:
    runs-on: self-hosted
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v4
        with:
          version: v3.12.0

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update Chart.yaml version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.VERSION }}/" helm/guided-traffic-com/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.VERSION }}\"/" helm/guided-traffic-com/Chart.yaml

      - name: Update values.yaml image tags
        run: |
          # Update backend image tag (backend.image.tag)
          sed -i '/^backend:/,/^[a-z]/ s/^\(    tag:\).*/\1 "${{ steps.version.outputs.VERSION }}"/' helm/guided-traffic-com/values.yaml
          # Update frontend image tag (frontend.image.tag)
          sed -i '/^frontend:/,/^[a-z]/ s/^\(    tag:\).*/\1 "${{ steps.version.outputs.VERSION }}"/' helm/guided-traffic-com/values.yaml

      - name: Package Helm chart
        run: |
          helm package helm/guided-traffic-com/
          mkdir -p repo
          mv guided-traffic-com-*.tgz repo/
          helm repo index repo/ --url https://guided-traffic.github.io/website_guided_traffic_com/

      - name: Save chart artifacts
        run: |
          mkdir -p /tmp/helm-charts
          cp repo/*.tgz /tmp/helm-charts/
          cp repo/index.yaml /tmp/helm-charts/

      - name: Publish to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save packaged chart
          cp repo/*.tgz /tmp/helm-charts/
          cp repo/index.yaml /tmp/helm-charts/new-index.yaml

          # Switch to gh-pages
          git checkout gh-pages || git checkout --orphan gh-pages

          # Merge with existing index if present
          if [ -f index.yaml ]; then
            helm repo index /tmp/helm-charts/ --url https://guided-traffic.github.io/website_guided_traffic_com/ --merge index.yaml
          fi

          # Copy artifacts
          cp /tmp/helm-charts/*.tgz .
          cp /tmp/helm-charts/index.yaml . 2>/dev/null || cp /tmp/helm-charts/new-index.yaml index.yaml

          git add --force *.tgz index.yaml
          git commit -m "chore: publish helm chart ${{ steps.version.outputs.VERSION }}"
          git push origin gh-pages

      - name: Upload Helm assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /tmp/helm-charts/*.tgz
            /tmp/helm-charts/index.yaml
