name: Release — Docker + Helm

on:
  release:
    types: [published]

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read
  attestations: write

jobs:
  build:
    runs-on: self-hosted
    strategy:
      matrix:
        include:
          - image: guidedtraffic/website-guided-traffic-frontend
            context: frontend/
            dockerfile: frontend/Dockerfile
            title: Frontend
          - image: guidedtraffic/website-guided-traffic-backend
            context: backend/
            dockerfile: backend/Dockerfile
            title: Backend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:v0.12.0
            network=host

      - uses: docker/login-action@v3
        with:
          username: guidedtraffic
          password: ${{ secrets.DOCKERHUB_PAT }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Guided Traffic ${{ matrix.title }}
            org.opencontainers.image.vendor=Guided Traffic
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=https://github.com/guided-traffic/website_guided_traffic_com
            org.opencontainers.image.documentation=https://github.com/guided-traffic/website_guided_traffic_com

      - name: Extract build metadata
        id: buildmeta
        run: |
          echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          provenance: true
          sbom: true
          build-args: |
            BUILD_NUMBER=${{ github.run_number }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.buildmeta.outputs.epoch }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ matrix.image }}:${{ steps.buildmeta.outputs.version }}
          upload-artifact: true
          upload-release-assets: false
          output-file: sbom-${{ matrix.title }}.spdx.json

      - name: Upload SBOM to release
        uses: softprops/action-gh-release@v2
        with:
          files: sbom-${{ matrix.title }}.spdx.json

      - name: Docker Scout CVE scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ matrix.image }}:${{ steps.buildmeta.outputs.version }}
          sarif-file: scout-report.sarif
          summary: true

  release-helm-gh:
    name: Release Helm Chart to GitHub Pages
    needs: build
    runs-on: self-hosted
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.12.0

      - name: Update Chart Version
        run: |
          # Extrahiere Version aus dem Release-Tag (ohne 'v' Prefix)
          VERSION=${GITHUB_REF_NAME#v}
          # Aktualisiere Chart und App Version
          sed -i "s/^version:.*$/version: ${VERSION}/" deploy/helm/internal-secrets-operator/Chart.yaml
          sed -i "s/^appVersion:.*$/appVersion: \"${VERSION}\"/" deploy/helm/internal-secrets-operator/Chart.yaml
          # Aktualisiere Image Tag in values.yaml
          sed -i "s/^  tag:.*$/  tag: \"${VERSION}\"/" deploy/helm/internal-secrets-operator/values.yaml

      - name: Create Helm Package
        run: |
          cd deploy/helm
          helm package internal-secrets-operator/
          mkdir -p repo
          mv *.tgz repo/
          # Erstelle temporären Index für das neue Chart
          helm repo index repo/ --url https://guided-traffic.github.io/internal-secrets-operator/
          cd ../..

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Save Chart Package
        run: |
          mkdir -p /tmp/helm-charts
          cp -r deploy/helm/repo/* /tmp/helm-charts/

      - name: Checkout gh-pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Pages
        run: |
          # Kopiere neue Charts ins Root-Verzeichnis
          cp /tmp/helm-charts/*.tgz .

          # Merge mit existierendem index.yaml falls vorhanden
          if [ -f index.yaml ]; then
            # Erstelle temporären Ordner für Merge
            mkdir -p temp-repo
            cp *.tgz temp-repo/
            # Merge mit existierendem Index
            helm repo index temp-repo/ --url https://guided-traffic.github.io/internal-secrets-operator/ --merge index.yaml
            cp temp-repo/index.yaml .
            rm -rf temp-repo
          else
            # Erstelle neuen Index falls keiner existiert
            helm repo index . --url https://guided-traffic.github.io/internal-secrets-operator/
          fi

          git add --force *.tgz index.yaml
          git commit -m "Release Helm chart for $GITHUB_REF_NAME"
          git push --force origin gh-pages

      - name: Update Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tgz
            index.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
