name: Frontend CI

on:
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  test:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yqq --no-install-recommends \
            libnspr4 libnss3 libnss3-tools libatk1.0-0t64 libatk-bridge2.0-0t64 \
            libcups2t64 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 \
            libcairo2 libasound2t64 libxshmfence1 \
            libx11-xcb1 libxfixes3 libxext6 libx11-6 libxcb1 \
            libxcursor1 libxi6 libxtst6 libglib2.0-0t64 \
            fonts-liberation xdg-utils wget

      - name: Install Chromium
        run: |
          npx puppeteer browsers install chrome
          echo "CHROME_BIN=$(find $HOME/.cache/puppeteer -name chrome -type f | head -1)" >> $GITHUB_ENV

      - name: Run tests
        run: npx ng test --watch=false --browsers=ChromeHeadless

      - name: Build
        run: npx ng build --configuration production --no-prerender
