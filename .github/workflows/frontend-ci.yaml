name: Frontend CI

on:
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  test:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: |
          npx puppeteer browsers install chrome
          echo "CHROME_BIN=$(find $HOME/.cache/puppeteer -name chrome -type f | head -1)" >> $GITHUB_ENV

      - name: Run tests
        run: npx ng test --watch=false --browsers=ChromeHeadless

      - name: Build
        run: npx ng build
