apiVersion: v1
kind: Service
metadata:
  name: {{ include "guided-traffic-com.fullname" . }}-backend
  labels:
    {{- include "guided-traffic-com.backendLabels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "guided-traffic-com.backendSelectorLabels" . | nindent 4 }}
