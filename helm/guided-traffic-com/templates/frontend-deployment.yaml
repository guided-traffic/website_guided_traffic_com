apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "guided-traffic-com.fullname" . }}-frontend
  labels:
    {{- include "guided-traffic-com.frontendLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "guided-traffic-com.frontendSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "guided-traffic-com.frontendSelectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.service.targetPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.frontend.healthCheck.path }}
              port: {{ .Values.frontend.healthCheck.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ .Values.frontend.healthCheck.path }}
              port: {{ .Values.frontend.healthCheck.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
