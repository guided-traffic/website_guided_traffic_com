# Default values for guided-traffic-com

# -- Backend configuration
backend:
  replicaCount: 1
  image:
    repository: ghcr.io/guided-traffic/website-backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  healthCheck:
    path: /healthz
    port: 8080

# -- Frontend configuration
frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/guided-traffic/website-frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    targetPort: 4000
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  healthCheck:
    path: /
    port: 4000

# -- Ingress configuration
ingress:
  enabled: true
  className: ""
  annotations: {}
  hosts:
    - host: www.guided-traffic.com
      paths:
        - path: /api
          pathType: Prefix
          service: backend
        - path: /
          pathType: Prefix
          service: frontend
  tls: []

# -- Image pull secrets
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
